<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>링글 리스트 썸네일 테스트</title>
    <style>
        body {
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            padding: 50px;
        }

        /* 링글 블로그 리스트의 실제 카드 컨테이너 규격 */
        .thumbnail-wrapper {
            position: relative;
            /* 셀렉터에 명시된 h-[196px] w-[336px] 적용 */
            width: 336px;
            height: 196px;
            overflow: hidden;
            background-color: #e5e7eb; /* bg-gray-300 */
            border-radius: 8px; /* 실제 사이트의 부드러운 모서리 느낌 추가 */
        }

        .thumbnail-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 이미지가 찌그러지지 않게 꽉 채움 */
            display: block;
        }

        .label {
            margin-top: 10px;
            font-size: 14px;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>

    <div>
        <div class="thumbnail-wrapper">
            <img src="KakaoTalk_Photo_2026-03-15-17-26-00.png" alt="링글 리스트 썸네일 테스트">
        </div>
        <p class="label">336px × 196px (리스트용 규격)</p>
    </div>

</body>
</html>
